<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Practicum</title>
<style>
  /* Палітра "Graphite": низькохромні нейтрали + теплий бурштиновий акцент */
  :root {
    --bg:        #121417;
    --surface:   #191c21;
    --surface-2: #20242b;
    --border:    #282d36;
    --text:      #d4dae3;
    --subtext:   #8b93a1;
    --dim:       #4b525f;
    --accent:    #d6a35c;
    --ok:        #97c397;
    --err:       #d4737a;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html { background: var(--bg); }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: 40px 28px 120px;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 28px;
  }

  h1#title {
    margin: 0;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--text);
  }

  h1#title::before {
    content: "practicum";
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.85;
    margin-bottom: 4px;
  }

  #progress {
    font-family: var(--mono);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    color: var(--subtext);
    white-space: nowrap;
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--surface);
  }

  .header-right { display: flex; gap: 10px; align-items: center; }

  #restart-btn, #back-btn, #next-btn {
    font-family: var(--sans);
    font-size: 12.5px;
    color: var(--subtext);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 12px;
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  #restart-btn:hover, #back-btn:hover:enabled, #next-btn:hover:enabled {
    color: var(--text); border-color: var(--dim);
  }
  #back-btn:disabled { opacity: 0.4; cursor: default; }

  /* тонкий прогрес уроку по символах */
  #lesson-progress {
    position: fixed;
    top: 0; left: 0;
    height: 3px; width: 0;
    background: var(--accent);
    transition: width 0.2s ease;
    z-index: 5;
  }

  /* Дерево проекту: росте по мірі друку; тільки на широких екранах */
  #tree {
    display: none;
    position: fixed;
    top: 132px;
    left: calc((100vw - 880px) / 2 - 300px);
    width: 272px;
    max-height: calc(100vh - 172px);
    overflow-y: auto;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.9;
    color: var(--subtext);
  }
  @media (min-width: 1480px) { #tree { display: block; } }

  #tree .tree-root {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.85;
    margin-bottom: 8px;
  }

  #tree .node { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #tree .node.dir { color: var(--dim); }
  #tree .node.file::before { content: "· "; color: var(--dim); }
  #tree .node.file.done { color: var(--subtext); }
  #tree .node.file.done::before { content: "✓ "; color: var(--ok); }
  #tree .node.file.current { color: var(--text); }
  #tree .node.file.current::before { content: "› "; color: var(--accent); }

  #tree .node.appear { animation: node-appear 0.45s ease-out; }
  @keyframes node-appear {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: none; }
  }

  #tree-action {
    margin-top: 10px;
    color: var(--ok);
    opacity: 0;
  }
  #tree-action.show { animation: action-fade 2.6s ease forwards; }
  @keyframes action-fade {
    0%   { opacity: 0; }
    12%  { opacity: 0.9; }
    70%  { opacity: 0.9; }
    100% { opacity: 0; }
  }

  #explanation {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 22px;
    margin-bottom: 18px;
    font-size: 15.5px;
    line-height: 1.65;
    color: var(--text);
  }

  #file {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--subtext);
    margin: 0 0 10px 4px;
    letter-spacing: 0.01em;
  }

  #file::before {
    content: "";
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 2px;
    background: var(--accent);
    opacity: 0.7;
    margin-right: 9px;
    vertical-align: 1px;
  }

  pre#code {
    margin: 0 0 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 28px;
    font-family: var(--mono);
    font-size: 17px;
    line-height: 1.8;
    white-space: pre;          /* довгі рядки — БЕЗ переносів */
    overflow-x: auto;
    transition: border-color 0.2s ease;
    /* ширина — під найдовший рядок, може виходити за колонку 880px.
       Кап: 50vw+86px = до краю екрана мінус місце нотатки (280+18)
       і відступ 28px, з урахуванням центрованої колонки */
    width: max-content;
    min-width: 100%;
    max-width: calc(50vw + 86px);
  }

  pre#code::-webkit-scrollbar { height: 8px; }
  pre#code::-webkit-scrollbar-track { background: transparent; }
  pre#code::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }
  pre#code::-webkit-scrollbar-thumb:hover { background: var(--dim); }

  .char {
    color: var(--dim);                 /* ще не надруковано */
    border-radius: 3px;
    transition: color 0.12s ease, background-color 0.12s ease;
  }

  .char.correct { color: var(--text); }

  .char.auto {
    color: var(--dim);                 /* авто-відступ: майже непомітний */
    opacity: 0.5;
  }

  .char.skip {                         /* коментар/докстрінг: читаємо, не друкуємо */
    color: color-mix(in oklab, var(--ok) 60%, var(--dim));
    font-style: italic;
  }

  .char.cursor {
    background: var(--accent);
    color: var(--bg);
    animation: cursor-pulse 1.1s ease-in-out infinite;
  }

  @keyframes cursor-pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.45; }
  }

  /* Спалах помилки: коротко, без трясіння */
  pre#code.error-flash {
    animation: code-error 0.3s ease-out;
  }

  @keyframes code-error {
    0%   { border-color: var(--err); box-shadow: 0 0 0 3px color-mix(in oklab, var(--err) 25%, transparent); }
    100% { border-color: var(--border); box-shadow: 0 0 0 0 transparent; }
  }

  @media (prefers-reduced-motion: reduce) {
    .char.cursor { animation: none; }
    pre#code.error-flash { animation: none; border-color: var(--err); }
  }

  /* Покрокова нотатка: маргіналія праворуч, на рівні рядка з курсором */
  #code-row { position: relative; }

  #step-note {
    position: absolute;
    /* left виставляє JS — правий край коду тепер динамічний */
    width: 280px;
    top: 0;
    transition: top 0.18s ease;
    background: var(--surface);
    border: 1px solid color-mix(in oklab, var(--accent) 35%, var(--border));
    border-radius: 10px;
    padding: 12px 16px;
  }

  /* немає місця праворуч — нотатка стає під кодом, код може до краю екрана */
  @media (max-width: 1419px) {
    #step-note {
      position: static;
      width: auto;
      border-radius: 12px;
      padding: 14px 22px;
    }
    pre#code { max-width: min(calc(100vw - 56px), calc(50vw + 384px)); }
  }

  #step-note .step-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.85;
    margin-bottom: 6px;
  }

  #step-text {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
  }

  section#results {
    text-align: center;
    padding-top: 24px;
  }

  section#results h2 {
    margin: 0 0 6px;
    font-size: 17px;
    font-weight: 600;
    color: var(--subtext);
    letter-spacing: 0.02em;
  }

  #r-accuracy {
    font-family: var(--mono);
    font-size: 88px;
    font-weight: 600;
    line-height: 1.1;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    margin: 8px 0 4px;
  }

  #r-accuracy::after {
    content: " точність";
    display: block;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 400;
    color: var(--subtext);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  section#results table {
    margin: 40px auto 0;
    border-collapse: collapse;
    font-size: 15px;
    min-width: 380px;
  }

  section#results td {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }

  section#results tr:last-child td { border-bottom: none; }

  section#results td:first-child { color: var(--subtext); }

  section#results td:last-child {
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    color: var(--text);
    text-align: right;
  }

  [hidden] { display: none !important; }
</style>
</head>
<body>
<div id="lesson-progress"></div>
<nav id="tree">
  <div class="tree-root" id="tree-root"></div>
  <div id="tree-nodes"></div>
  <div id="tree-action"></div>
</nav>
<div class="wrap">
<header>
  <h1 id="title"></h1>
  <div class="header-right">
    <button id="back-btn" type="button" title="попередній фрагмент">← назад</button>
    <button id="next-btn" type="button" title="наступний фрагмент (останній — завершує урок)">вперед →</button>
    <button id="restart-btn" type="button" title="скинути прогрес і почати з початку">⟲ заново</button>
    <div id="progress"></div>
  </div>
</header>
<main id="main">
  <div id="explanation"></div>
  <div id="file"></div>
  <div id="code-row">
    <pre id="code"></pre>
    <div id="step-note" hidden>
      <div class="step-label">зараз пишемо</div>
      <div id="step-text"></div>
    </div>
  </div>
</main>
<section id="results" hidden>
  <h2>Урок завершено</h2>
  <div id="r-accuracy"></div>
  <table>
    <tbody>
      <tr><td>Час</td><td id="r-time"></td></tr>
      <tr><td>Помилки друку</td><td id="r-errors"></td></tr>
    </tbody>
  </table>
</section>
</div>
<script>
const LESSON = __LESSON_JSON__;

// Друкарські символи, яких нема на клавіатурі → ASCII-аналоги.
// Заміни строго 1:1, щоб офсети steps лишались чинними.
const CHAR_MAP = { '—':'-', '–':'-', '−':'-', '\u00A0':' ',
                   '“':'"', '”':'"', '„':'"', '«':'"', '»':'"',
                   '‘':"'", '’':"'", '‚':"'" };
for (const f of LESSON.fragments)
  f.code = f.code.replace(/[—–−\u00A0“”„«»‘’‚]/g, c => CHAR_MAP[c]);

const $ = id => document.getElementById(id);
const state = {
  frag: 0, pos: 0, maxFrag: 0,
  keystrokes: 0, errors: 0,
  startedAt: null,
};
let chars = [];   // span-елементи символів активного фрагмента

const RESUME_KEY = 'practicum-resume:' + LESSON.title + ':' + LESSON.date;
const TOTAL_CHARS = LESSON.fragments.reduce((n, f) => n + f.code.length, 0);

function typedChars() {
  let n = 0;
  for (let i = 0; i < state.frag; i++) n += LESSON.fragments[i].code.length;
  return n + state.pos;
}

function updateProgressBar() {
  $('lesson-progress').style.width = (100 * typedChars() / TOTAL_CHARS) + '%';
}

function saveProgress() {
  localStorage.setItem(RESUME_KEY, JSON.stringify({
    frag: state.frag, pos: state.pos, maxFrag: state.maxFrag,
    keystrokes: state.keystrokes, errors: state.errors,
    elapsed: state.startedAt ? Date.now() - state.startedAt : 0,
  }));
}

// --- Дерево проекту: файли попередніх уроків (LESSON.tree) + файли
// відвіданих фрагментів; раз з'явившись, вузол не зникає ---
const treeShown = new Set(); // ключі вузлів, що вже з'являлись (анімація)

function fragPath(f) { return f.file.split(' (')[0].trim(); }

function treeFiles() {
  const files = [];
  const push = (path, cls) => {
    const ex = files.find(x => x.path === path);
    if (ex) { if (cls === 'current') ex.cls = 'current'; }
    else files.push({ path, cls });
  };
  (LESSON.tree || []).forEach(p => push(p, 'done'));
  const last = Math.min(state.maxFrag, LESSON.fragments.length - 1);
  for (let i = 0; i <= last; i++) {
    const cls = i === state.frag && $('results').hidden ? 'current' : 'done';
    push(fragPath(LESSON.fragments[i]), cls);
  }
  return files;
}

function renderTree() {
  $('tree-root').textContent = LESSON.project + '/';
  const rows = [];
  const dirs = new Set();
  for (const f of treeFiles()) {
    const parts = f.path.split('/');
    for (let d = 1; d < parts.length; d++) {
      const dir = parts.slice(0, d).join('/');
      if (!dirs.has(dir)) {
        dirs.add(dir);
        rows.push({ key: dir, label: parts[d - 1] + '/', cls: 'dir', depth: d - 1 });
      }
    }
    rows.push({ key: f.path, label: parts[parts.length - 1],
                cls: 'file ' + f.cls, depth: parts.length - 1 });
  }
  const box = $('tree-nodes');
  box.innerHTML = '';
  const newDirs = [];
  for (const r of rows) {
    const el = document.createElement('div');
    el.className = 'node ' + r.cls;
    el.style.paddingLeft = (r.depth * 14) + 'px';
    el.textContent = r.label;
    if (!treeShown.has(r.key)) {
      el.classList.add('appear');
      treeShown.add(r.key);
      if (r.cls === 'dir') newDirs.push(r.key);
    }
    box.appendChild(el);
  }
  if (newDirs.length) treeAction('+ mkdir ' + newDirs[newDirs.length - 1]);
}

function treeAction(text) {
  const el = $('tree-action');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

function renderFragment() {
  const f = LESSON.fragments[state.frag];
  state.maxFrag = Math.max(state.maxFrag, state.frag);
  $('title').textContent = LESSON.title;
  $('progress').textContent = (state.frag + 1) + ' / ' + LESSON.fragments.length;
  $('explanation').textContent = f.explanation;
  $('file').textContent = f.file;
  const codeEl = $('code');
  codeEl.innerHTML = '';
  chars = [];
  const skips = f.skips || [];
  [...f.code].forEach((ch, i) => {
    const span = document.createElement('span');
    span.className = 'char';
    if (skips.some(s => i >= s.start && i < s.end)) span.classList.add('skip');
    span.textContent = ch === '\n' ? '⏎\n' : ch;
    codeEl.appendChild(span);
    chars.push(span);
  });
  state.pos = 0;
  $('back-btn').disabled = state.frag === 0;
  advanceAuto();
  updateCursor();
  renderTree();
}

// Автопроліт: відступи на початку рядка і skip-діапазони (коментарі,
// докстрінги) вводити не треба
function advanceAuto() {
  const code = LESSON.fragments[state.frag].code;
  while (state.pos < code.length) {
    if (chars[state.pos].classList.contains('skip')) { state.pos++; continue; }
    const atLineStart = state.pos === 0 || code[state.pos - 1] === '\n';
    const prevAuto = state.pos > 0 && chars[state.pos - 1].classList.contains('auto');
    if (code[state.pos] === ' ' && (atLineStart || prevAuto)) {
      chars[state.pos].classList.add('auto');
      state.pos++;
    } else break;
  }
}

function updateCursor() {
  chars.forEach(c => c.classList.remove('cursor'));
  if (state.pos < chars.length) {
    chars[state.pos].classList.add('cursor');
    chars[state.pos].scrollIntoView({ block: 'nearest' });
  }
  updateStepNote();
  updateProgressBar();
}

// Нотатка блоку, в якому зараз стоїть курсор; їде по вертикалі за курсором
function updateStepNote() {
  const steps = LESSON.fragments[state.frag].steps || [];
  const s = steps.find(s => state.pos >= s.start && state.pos < s.end);
  if (!s) { $('step-note').hidden = true; return; }
  $('step-text').textContent = s.note;
  $('step-note').hidden = false;
  $('step-note').style.left = ($('code').offsetWidth + 18) + 'px';
  const cur = chars[state.pos];
  if (cur) $('step-note').style.top = (cur.offsetTop - 7) + 'px';
}

function flashError() {
  const el = $('code');
  el.classList.remove('error-flash');
  void el.offsetWidth; // перезапуск анімації
  el.classList.add('error-flash');
}

document.addEventListener('keydown', e => {
  if (!$('results').hidden) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const code = LESSON.fragments[state.frag].code;
  if (state.pos >= code.length) return;
  let key = e.key;
  if (key === 'Enter') key = '\n';
  if (key.length !== 1 && key !== '\n') return; // Shift, F5, стрілки — ігноруємо
  e.preventDefault();
  state.startedAt ??= Date.now();
  state.keystrokes++;
  if (key === code[state.pos]) {
    chars[state.pos].classList.add('correct');
    state.pos++;
    advanceAuto();
    updateCursor();
    checkFragmentDone();
    if ($('results').hidden) saveProgress(); // після можливого переходу фрагмента
  } else {
    state.errors++;
    flashError();
  }
});

function checkFragmentDone() {
  const code = LESSON.fragments[state.frag].code;
  if (state.pos < code.length) return;
  if (state.frag + 1 < LESSON.fragments.length) {
    state.frag++;
    renderFragment();
  } else {
    showResults();
  }
}

function showResults(skipped) {
  $('main').hidden = true;
  const secs = state.startedAt ? Math.round((Date.now() - state.startedAt) / 1000) : 0;
  const acc = state.keystrokes
    ? Math.round(100 * (state.keystrokes - state.errors) / state.keystrokes)
    : 100;
  document.querySelector('#results h2').textContent =
    skipped ? 'Урок зараховано (пропущено)' : 'Урок завершено';
  $('r-accuracy').textContent = acc + '%';
  $('r-time').textContent = Math.floor(secs / 60) + ':' + String(secs % 60).padStart(2, '0');
  $('r-errors').textContent = state.errors;
  $('results').hidden = false;
  renderTree();
  $('lesson-progress').style.width = '100%';
  localStorage.removeItem(RESUME_KEY);
  let history;
  try { history = JSON.parse(localStorage.getItem('practicum-history') || '[]'); } catch { history = []; }
  if (!Array.isArray(history)) history = [];
  history.push({
    title: LESSON.title, project: LESSON.project, date: LESSON.date,
    accuracy: acc, seconds: secs, errors: state.errors,
    skipped: !!skipped,
    finishedAt: new Date().toISOString(),
  });
  localStorage.setItem('practicum-history', JSON.stringify(history));
}

function gotoFragment(i) {
  state.frag = i;
  renderFragment();
  saveProgress();
}

$('back-btn').onclick = () => {
  if ($('results').hidden && state.frag > 0) gotoFragment(state.frag - 1);
  $('back-btn').blur();
};

$('next-btn').onclick = () => {
  if ($('results').hidden) {
    if (state.frag + 1 < LESSON.fragments.length) gotoFragment(state.frag + 1);
    else showResults(true);
  }
  $('next-btn').blur();
};

$('restart-btn').onclick = () => {
  localStorage.removeItem(RESUME_KEY);
  state.frag = 0; state.pos = 0; state.maxFrag = 0;
  state.keystrokes = 0; state.errors = 0;
  state.startedAt = null;
  $('results').hidden = true;
  $('main').hidden = false;
  renderFragment();
  $('restart-btn').blur(); // інакше пробіл/Enter під час друку тиснутимуть кнопку
};

// Відновлення незавершеної сесії цього уроку
function init() {
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(RESUME_KEY) || 'null'); } catch {}
  if (saved && saved.frag < LESSON.fragments.length) {
    state.frag = saved.frag;
    state.maxFrag = saved.maxFrag ?? saved.frag;
    state.keystrokes = saved.keystrokes || 0;
    state.errors = saved.errors || 0;
    if (saved.elapsed) state.startedAt = Date.now() - saved.elapsed;
    renderFragment();
    const upto = Math.min(saved.pos || 0, chars.length);
    for (let i = 0; i < upto; i++) chars[i].classList.add('correct');
    state.pos = upto;
    advanceAuto(); // якщо збережена позиція впала на skip-діапазон
    updateCursor();
  } else {
    renderFragment();
  }
}
init();
</script>
</body>
</html>
